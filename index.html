<!DOCTYPE html>
<html lang="zh-tw">

<head>
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <link href="./images/drink2.png" rel="icon" type="image/x-icon" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/6.2.0/firebase.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <title>團購點餐系統</title>
    <!-- Critical Menu Modal Layout Overrides -->
    <style>
        /* Force container strict bounds */
        #menu-modal .modal-content {
            display: flex;
            flex-direction: column;
            overflow: hidden !important;
        }
        
        #menu-upload-area {
            flex: 1;
            min-height: 0 !important; /* Force flex child sizing */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden !important; /* Prevent image overflow */
        }
        
        #menu-image {
            max-width: 100% !important;
            max-height: 100% !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain !important;
            transform-origin: center center;
        }

        #menu-thumbnails {
            display: flex !important;
            gap: 10px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            overflow-x: auto !important;
            min-height: 70px !important;
            flex-shrink: 0; /* Don't squash thumbnails */
        }

        .menu-thumbnail {
            width: 60px !important;
            height: 60px !important;
            min-width: 60px !important;
            border-radius: 8px !important;
            object-fit: cover !important;
            cursor: pointer;
            opacity: 0.6;
            margin: 0 !important;
            padding: 0 !important;
        }

        .menu-thumbnail.active {
            opacity: 1 !important;
            border: 2px solid var(--primary-gold) !important;
        }
        
        /* Zoom Controls Premium Styling Override */
        #zoom-controls {
            z-index: 9999 !important;
            position: absolute !important;
            bottom: 25px !important;
            right: 25px !important;
            display: flex !important;
            gap: 12px !important;
            background: var(--bg-panel) !important;
            padding: 12px 16px !important;
            border-radius: 20px !important;
            backdrop-filter: var(--glass-blur) !important;
            -webkit-backdrop-filter: var(--glass-blur) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: var(--shadow-card) !important;
        }

        #zoom-controls button {
            background: var(--bg-input) !important;
            border: 1px solid var(--border-light) !important;
            color: var(--text-main) !important;
            width: 42px !important;
            height: 42px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            font-size: 1.3rem !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
            box-shadow: var(--shadow-btn) !important;
        }

        #zoom-controls button:hover {
            background: var(--primary-gold) !important;
            color: #111 !important;
            border-color: var(--primary-gold) !important;
            transform: translateY(-3px) scale(1.05) !important;
            box-shadow: 0 8px 15px var(--primary-glow) !important;
        }

        #zoom-controls button:active {
            transform: translateY(0) scale(0.95) !important;
        }

        #btn-delete-menu {
            background: rgba(255, 68, 68, 0.15) !important;
            color: #ff6b6b !important;
            border-color: rgba(255, 68, 68, 0.3) !important;
            margin-left: 10px !important;
        }

        #btn-delete-menu:hover {
            background: #ff4444 !important;
            color: white !important;
            border-color: #ff4444 !important;
            box-shadow: 0 8px 15px rgba(255, 68, 68, 0.4) !important;
        }

        /* Mobile Responsive for Zoom Controls */
        @media (max-width: 768px) {
            #zoom-controls {
                left: 50% !important;
                right: auto !important;
                transform: translateX(-50%) !important;
                bottom: 15px !important;
                padding: 8px 12px !important;
                gap: 8px !important;
                width: max-content !important;
            }
            #zoom-controls button {
                width: 36px !important;
                height: 36px !important;
                font-size: 1.1rem !important;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- 主要點餐卡片 -->
        <div class="main-card">
            <header class="app-header" style="position: relative;">
                <h1 style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 5v14c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M4 5h16M14 2L10 10M10 2l4 8M12 10v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    團購點餐去
                </h1>
                <button id="theme-toggle" class="theme-btn" title="切換主題" aria-label="Toggle Theme">
                    <svg class="icon-dark theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="icon-light theme-icon" style="display:none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
            </header>

            <!-- 菜單圖片 Modal (Moved to Body end) -->

            <!-- 分頁導航 -->
            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="drink">
                    <!-- Inline SVG for crisp, transparent icon -->
                    <svg class="tab-icon-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M17 8H7C6.44772 8 6 8.44772 6 9V19C6 20.6569 7.34315 22 9 22H15C16.6569 22 18 20.6569 18 19V9C18 8.44772 17.5523 8 17 8Z"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M7 8L8.5 3H15.5L17 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M12 3V1" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <circle cx="10" cy="18" r="1" fill="currentColor" />
                        <circle cx="14" cy="18" r="1" fill="currentColor" />
                        <circle cx="12" cy="15" r="1" fill="currentColor" />
                    </svg>
                    訂飲料
                </button>
                <button class="tab-btn" data-tab="bento">
                    <svg class="tab-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 6h16v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"></path>
                        <path d="M4 11h16"></path>
                        <path d="M12 6v5"></path>
                    </svg>
                    訂便當
                </button>
            </div>

            <!-- 飲料表單 -->
            <div id="tab-drink" class="tab-content active">
                <form id="drink-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">姓名</label>
                            <input id="name" name="name" placeholder="你是誰？" required type="text" />
                        </div>
                        <div class="form-group">
                            <label for="items">飲料品項</label>
                            <input id="items" name="items" placeholder="想喝什麼？" required type="text" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>甜度</label>
                            <div class="custom-select" data-target="sugar">
                                <div class="custom-select-trigger">選擇甜度</div>
                                <div class="custom-options">
                                    <div class="custom-option" data-value="固定">固定</div>
                                    <div class="custom-option" data-value="正常">正常</div>
                                    <div class="custom-option" data-value="少糖">少糖 (7分)</div>
                                    <div class="custom-option" data-value="半糖">半糖 (5分)</div>
                                    <div class="custom-option" data-value="微糖">微糖 (3分)</div>
                                    <div class="custom-option" data-value="一分">一分 (1分)</div>
                                    <div class="custom-option" data-value="無糖">無糖</div>
                                </div>
                            </div>
                            <input id="sugar" name="sugar" type="hidden" />
                        </div>
                        <div class="form-group">
                            <label>冰塊</label>
                            <div class="custom-select" data-target="ice">
                                <div class="custom-select-trigger">選擇冰塊</div>
                                <div class="custom-options">
                                    <div class="custom-option" data-value="正常">正常</div>
                                    <div class="custom-option" data-value="少冰">少冰</div>
                                    <div class="custom-option" data-value="微冰">微冰</div>
                                    <div class="custom-option" data-value="去冰">去冰</div>
                                    <div class="custom-option" data-value="完全去冰">完全去冰</div>
                                    <div class="custom-option" data-value="溫的">溫的</div>
                                    <div class="custom-option" data-value="熱的">熱的</div>
                                </div>
                            </div>
                            <input id="ice" name="ice" type="hidden" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="feed">加料</label>
                            <input id="feed" name="feed" placeholder="珍珠、椰果..." type="text" />
                        </div>
                        <div class="form-group">
                            <label for="money">價格</label>
                            <div class="number-input-wrapper">
                                <button type="button" class="btn-spin minus">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                </button>
                                <input id="money" name="money" placeholder="多少錢？" required type="number" min="0" step="5" />
                                <button type="button" class="btn-spin plus">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="remark">備註</label>
                        <input id="remark" name="remark" placeholder="特殊需求..." type="text" />
                    </div>
                </form>
            </div>

            <!-- 便當表單 -->
            <div id="tab-bento" class="tab-content">
                <form id="bento-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bento-name">姓名</label>
                            <input id="bento-name" name="name" placeholder="你是誰？" required type="text" />
                        </div>
                        <div class="form-group">
                            <label for="main-dish">主餐</label>
                            <input id="main-dish" name="items" placeholder="雞腿飯、排骨飯..." required type="text" />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>飯/麵選擇</label>
                            <div class="custom-select" data-target="rice-type">
                                <div class="custom-select-trigger">正常飯</div>
                                <div class="custom-options">
                                    <div class="custom-option" data-value="正常飯">正常飯</div>
                                    <div class="custom-option" data-value="少飯">少飯</div>
                                    <div class="custom-option" data-value="半飯">半飯</div>
                                    <div class="custom-option" data-value="多飯">多飯</div>
                                    <div class="custom-option" data-value="不要飯">不要飯</div>
                                    <div class="custom-option" data-value="換菜">換菜</div>
                                </div>
                            </div>
                            <input id="rice-type" name="riceType" type="hidden" value="正常飯" />
                        </div>
                        <div class="form-group">
                            <label for="bento-money">價格</label>
                            <div class="number-input-wrapper">
                                <button type="button" class="btn-spin minus">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                </button>
                                <input id="bento-money" name="money" placeholder="多少錢？" required type="number" min="0" step="5" />
                                <button type="button" class="btn-spin plus">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="bento-sides">配菜/加點 (選填)</label>
                        <input id="bento-sides" name="feed" placeholder="加蛋、不吃洋蔥..." type="text" />
                    </div>
                </form>
            </div>

            <!-- 按鈕區域 -->
            <div class="button-area">
                <div class="btn-submit" title="送出訂單">
                    <span>＋ 新增訂單</span>
                </div>
                <button class="btn-delete-all">清空重來</button>
            </div>

            <!-- 訂單列表區域 -->
            <div class="orders-section">
                <div class="section-header">
                    <h3 style="display: flex; align-items: center; gap: 8px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6"></line>
                            <line x1="8" y1="12" x2="21" y2="12"></line>
                            <line x1="8" y1="18" x2="21" y2="18"></line>
                            <line x1="3" y1="6" x2="3.01" y2="6"></line>
                            <line x1="3" y1="12" x2="3.01" y2="12"></line>
                            <line x1="3" y1="18" x2="3.01" y2="18"></line>
                        </svg>
                        訂單列表
                    </h3>
                    <div class="list-filters">
                        <span class="filter-tag active" data-filter="all">全部</span>
                        <span class="filter-tag" data-filter="drink">飲料</span>
                        <span class="filter-tag" data-filter="bento">便當</span>
                    </div>
                </div>
                <div id="orders-list" class="orders-grid">
                    <!-- 訂單卡片會加在這裡 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 左側菜單按鈕 (懸浮 - 固定在螢幕左側) -->
    <div id="menu-side-trigger" class="side-trigger left-trigger">
        <span class="trigger-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </span>
        <span class="trigger-text">菜單</span>
    </div>

    <!-- 左側設定按鈕 (懸浮 - 固定在螢幕左下側) -->
    <div id="settings-side-trigger" class="side-trigger left-trigger settings-trigger">
        <span class="trigger-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </span>
        <span class="trigger-text">設定</span>
    </div>

    <!-- 設定 Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content settings-content">
            <span class="close-modal close-settings">&times;</span>
            <h3 style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                選項設定
            </h3>

            <div class="settings-tabs">
                <button class="settings-tab active" data-type="sugar" style="display: flex; align-items: center; justify-content: center; gap: 6px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="4"/><path d="M10.83 10.83L18 18"/><path d="M12 11l-3 4-2-2"/></svg>
                    甜度設定
                </button>
                <button class="settings-tab" data-type="ice" style="display: flex; align-items: center; justify-content: center; gap: 6px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    冰塊設定
                </button>
            </div>

            <div class="settings-body">
                <div class="add-item-row">
                    <input type="text" id="new-setting-input" placeholder="新增選項...">
                    <button id="btn-add-setting">＋ 新增</button>
                </div>

                <div class="settings-list-container">
                    <ul id="settings-list" class="settings-list">
                        <!-- JS will populate this -->
                    </ul>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-reset-default">還原預設值</button>
            </div>
        </div>
    </div>

    <!-- 右側統計面板 (預設隱藏，點擊展開) -->
    <div id="stats-panel">
        <div class="panel-trigger">
            <span class="trigger-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            </span>
            <span class="trigger-text">統計</span>
        </div>
        <div class="panel-content">
            <h3>訂單統計</h3>

            <div class="stats-group">
                <h4 style="display: flex; align-items: center; gap: 6px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 8H7C6.44772 8 6 8.44772 6 9V19C6 20.6569 7.34315 22 9 22H15C16.6569 22 18 20.6569 18 19V9C18 8.44772 17.5523 8 17 8Z"></path>
                        <path d="M7 8L8.5 3H15.5L17 8"></path>
                        <path d="M12 3V1"></path>
                        <circle cx="10" cy="18" r="1" fill="currentColor"></circle>
                        <circle cx="14" cy="18" r="1" fill="currentColor"></circle>
                        <circle cx="12" cy="15" r="1" fill="currentColor"></circle>
                    </svg>
                    飲料統計
                </h4>
                <div id="stats-drink-list" class="stats-list"></div>
            </div>

            <div class="stats-group">
                <h4 style="display: flex; align-items: center; gap: 6px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 6h16v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"></path>
                        <path d="M4 11h16"></path>
                        <path d="M12 6v5"></path>
                    </svg>
                    便當統計
                </h4>
                <div id="stats-bento-list" class="stats-list"></div>
            </div>

            <div class="total-summary">
                <div class="summary-item">
                    <span>總杯/份數</span>
                    <span id="total-count">0</span>
                </div>
                <div class="summary-item">
                    <span>總金額</span>
                    <span id="total-money">$0</span>
                </div>
            </div>

            <button id="btn-copy-stats">複製統計結果</button>
        </div>
    </div>

    <!-- 菜單圖片 Modal -->
    <div id="menu-modal" class="modal">
        <div class="modal-content menu-content">
            <span class="close-modal close-menu">&times;</span>
            <h3 style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                今日菜單
            </h3>
            
            <!-- 選單圖片縮圖/切換區 -->
            <div id="menu-thumbnails" class="menu-thumbnails">
                <!-- JS dynamically generates thumbnails here -->
            </div>

            <div id="menu-upload-area" class="menu-upload-area">
                <img id="menu-image" src="" alt="菜單圖片" style="display:none;" />
                <div id="upload-placeholder" class="upload-placeholder">
                    <p>目前沒有菜單照片 😢</p>
                    <p>您可以 <strong>拖曳圖片</strong> 到這裡</p>
                    <p>或是直接貼上 <strong>Ctrl+V</strong></p>
                    <button id="btn-select-file">選擇圖片</button>
                    <input type="file" id="menu-file-input" accept="image/*" style="display:none;">
                </div>

                <div id="zoom-controls" class="zoom-controls" style="display:none;">
                    <button id="btn-zoom-in" title="放大">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                    </button>
                    <button id="btn-zoom-out" title="縮小">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                    </button>
                    <button id="btn-zoom-reset" title="重置大小">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    </button>
                    <button id="btn-delete-menu" title="刪除此張菜單">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                </div>
            </div>
            
            <div class="modal-footer">
                * 支援電腦版直接貼上截圖 <br>
                * 可以上傳多張菜單，使用縮圖快速切換
            </div>
        </div>
    </div>

    <script src="new2.js"></script>
</body>

</html>
